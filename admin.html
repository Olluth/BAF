<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | BAF TCG</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- Page de connexion -->
  <div id="login-page" class="admin-login-page">
    <div class="admin-login-card">
      <a href="index.html" class="brand">BAF TCG</a>
      <h1 class="admin-login-title">Admin</h1>
      <div id="login-error" class="admin-login-error hidden"></div>
      <form id="login-form" class="admin-login-form" novalidate>
        <label for="login-username">Nom d'utilisateur</label>
        <input type="text" id="login-username" autocomplete="username" required />
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" autocomplete="current-password" required />
        <button type="submit" id="login-submit" class="button button-primary">Se connecter</button>
      </form>
    </div>
  </div>

  <!-- Tableau de bord (affiché après connexion) -->
  <div id="dashboard" class="hidden">
    <header class="site-header admin-header">
      <div class="container header-inner">
        <a href="index.html" class="brand">BAF TCG</a>
        <span class="admin-badge">Admin</span>
        <div class="admin-header-actions">
          <a href="index.html" class="button">Voir le site</a>
          <button id="logout-btn" type="button" class="button">Déconnexion</button>
        </div>
      </div>
    </header>

    <main class="admin-main section">
      <div class="container">

        <nav class="admin-tabs" aria-label="Sections admin">
          <button class="admin-tab active" data-tab="articles">Articles</button>
          <button class="admin-tab" data-tab="players">Joueurs</button>
        </nav>

        <!-- Panneau Articles -->
        <div id="panel-articles" class="admin-panel-section">
          <div class="admin-panel-header">
            <h2>Articles</h2>
            <button id="new-article-btn" class="button button-primary">+ Nouvel article</button>
          </div>

          <div id="article-form-container" class="admin-form-container hidden">
            <form id="article-form" class="admin-form" novalidate>
              <h3 id="article-form-title">Nouvel article</h3>
              <input type="hidden" id="article-id" />
              <label for="article-title">Titre</label>
              <input type="text" id="article-title" placeholder="Titre de l'article" required />
              <label for="article-excerpt">Extrait</label>
              <input type="text" id="article-excerpt" placeholder="Courte description affichée sur la page d'accueil (facultatif)" />
              <label for="article-content">Contenu</label>
              <textarea id="article-content" rows="8" placeholder="Contenu complet de l'article" required></textarea>
              <div class="admin-form-actions">
                <button type="submit" class="button button-primary">Enregistrer</button>
                <button type="button" id="cancel-article-btn" class="button">Annuler</button>
              </div>
            </form>
          </div>

          <ul id="article-list" class="admin-list"></ul>
        </div>

        <!-- Panneau Joueurs -->
        <div id="panel-players" class="admin-panel-section hidden">
          <div class="admin-panel-header">
            <h2>Joueurs suivis</h2>
          </div>
          <p class="admin-panel-desc">Les joueurs listés ici sont mis en avant sur la page de suivi de tournoi.</p>

          <form id="add-player-form" class="admin-add-form" novalidate>
            <input type="text" id="player-input" placeholder="Nom du joueur" required />
            <button type="submit" class="button button-primary">Ajouter</button>
          </form>

          <ul id="player-list" class="admin-list"></ul>
        </div>

      </div>
    </main>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
