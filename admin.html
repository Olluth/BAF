<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page.title.admin">Admin | BAF TCG</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- Page de connexion -->
  <div id="login-page" class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-top">
        <a href="index.html" class="brand">BAF TCG</a>
        <button id="lang-toggle" type="button" class="button lang-toggle-btn">EN</button>
      </div>
      <h1 class="admin-login-title">Admin</h1>
      <div id="login-error" class="admin-login-error hidden"></div>
      <form id="login-form" class="admin-login-form" novalidate>
        <label for="login-username" data-i18n="admin.login.username">Nom d'utilisateur</label>
        <input type="text" id="login-username" autocomplete="username" required />
        <label for="login-password" data-i18n="admin.login.password">Mot de passe</label>
        <input type="password" id="login-password" autocomplete="current-password" required />
        <button type="submit" id="login-submit" class="button button-primary" data-i18n="admin.login.submit">Se connecter</button>
      </form>
    </div>
  </div>

  <!-- Tableau de bord (affiché après connexion) -->
  <div id="dashboard" class="hidden">
    <header class="site-header admin-header">
      <div class="container header-inner">
        <a href="index.html" class="brand">BAF TCG</a>
        <span class="admin-badge">Admin</span>
        <div class="admin-header-actions">
          <a href="index.html" class="button" data-i18n="admin.viewsite">Voir le site</a>
          <button id="logout-btn" type="button" class="button" data-i18n="admin.logout">Déconnexion</button>
        </div>
      </div>
    </header>

    <main class="admin-main section">
      <div class="container">

        <nav class="admin-tabs" aria-label="Sections admin">
          <button class="admin-tab active" data-tab="articles" data-i18n="admin.tab.articles">Articles</button>
          <button class="admin-tab" data-tab="players" data-i18n="admin.tab.players">Joueurs</button>
        </nav>

        <!-- Panneau Articles -->
        <div id="panel-articles" class="admin-panel-section">
          <div class="admin-panel-header">
            <h2 data-i18n="admin.articles.title">Articles</h2>
            <button id="new-article-btn" class="button button-primary" data-i18n="admin.articles.new">+ Nouvel article</button>
          </div>

          <div id="article-form-container" class="admin-form-container hidden">
            <form id="article-form" class="admin-form" novalidate>
              <h3 id="article-form-title" data-i18n="admin.articles.form.new">Nouvel article</h3>
              <input type="hidden" id="article-id" />
              <label for="article-title" data-i18n="admin.form.title.label">Titre</label>
              <input type="text" id="article-title" data-i18n-placeholder="admin.form.title.placeholder" placeholder="Titre de l'article" required />
              <label for="article-excerpt" data-i18n="admin.form.excerpt.label">Extrait</label>
              <input type="text" id="article-excerpt" data-i18n-placeholder="admin.form.excerpt.placeholder" placeholder="Courte description affichée sur la page d'accueil (facultatif)" />
              <label for="article-content" data-i18n="admin.form.content.label">Contenu</label>
              <textarea id="article-content" rows="8" data-i18n-placeholder="admin.form.content.placeholder" placeholder="Contenu complet de l'article" required></textarea>
              <div class="admin-form-actions">
                <button type="submit" class="button button-primary" data-i18n="admin.form.save">Enregistrer</button>
                <button type="button" id="cancel-article-btn" class="button" data-i18n="admin.form.cancel">Annuler</button>
              </div>
            </form>
          </div>

          <ul id="article-list" class="admin-list"></ul>
        </div>

        <!-- Panneau Joueurs -->
        <div id="panel-players" class="admin-panel-section hidden">
          <div class="admin-panel-header">
            <h2 data-i18n="admin.players.title">Joueurs suivis</h2>
          </div>
          <p class="admin-panel-desc" data-i18n="admin.players.desc">Les joueurs listés ici sont mis en avant sur la page de suivi de tournoi.</p>

          <form id="add-player-form" class="admin-add-form" novalidate>
            <input type="text" id="player-input" data-i18n-placeholder="admin.players.placeholder" placeholder="Nom du joueur" required />
            <button type="submit" class="button button-primary" data-i18n="admin.players.add">Ajouter</button>
          </form>

          <ul id="player-list" class="admin-list"></ul>
        </div>

      </div>
    </main>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
