# Drop this in /etc/nginx/sites-available/fabtcg-proxy
# then: sudo ln -s /etc/nginx/sites-available/fabtcg-proxy /etc/nginx/sites-enabled/
# then: sudo certbot --nginx -d proxy.VOTRE-DOMAINE.com
# then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name proxy.VOTRE-DOMAINE.com;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }
}
# Certbot ajoutera automatiquement le bloc HTTPS 443 ci-dessous lors de l'exécution de certbot --nginx
