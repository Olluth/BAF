<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi de tournoi | BAF TCG</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">BAF TCG</a>
      <nav class="nav">
        <a href="index.html#about">À propos</a>
        <a href="index.html#events">Événements</a>
        <a href="index.html#news">Actualités</a>
        <a href="index.html#contact">Contact</a>
        <a href="tournament.html" class="button">Suivi de tournoi</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-header">
        <span class="eyebrow">Suivi</span>
        <h2>Classements en direct</h2>
      </div>
      <p>Saisissez le slug de l'événement, la vue de couverture et le round pour charger les classements en direct de la couverture Flesh and Blood.</p>

      <form id="tracker-form" class="tracker-form">
        <label for="event-slug">Slug de l'événement</label>
        <input type="text" id="event-slug" placeholder="exemple-regionals-2026" required />
        <label for="coverage-view">Vue de couverture</label>
        <input type="text" id="coverage-view" placeholder="main" required />
        <label for="round-number">Round</label>
        <input type="number" id="round-number" min="1" placeholder="1" required />
        <button type="submit" class="button button-primary">Charger les classements</button>
      </form>

      <div id="tracker-status" class="tracker-status"></div>
      <section id="visitor-player-list" class="visitor-player-list"></section>
      <div id="standings-container" class="standings-container"></div>
      <div id="tracked-players" class="tracked-players"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 BAF TCG Association. Suivi en direct pour les membres.</p>
    </div>
  </footer>

  <script src="js/tournament.js"></script>
</body>
</html>
