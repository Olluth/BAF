</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><img src="images/baf_logo.png" alt="LA BAF" /></a>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="about.html" data-i18n="nav.about">L'Asso</a>

        <a href="contact.html" data-i18n="nav.contact">Contact</a>
        <a href="tournament.html" class="button" data-i18n="nav.tracker">Suivi de tournoi</a>
        <a href="members.html" id="nav-signin-link" class="button">Se connecter</a>
        <button type="button" id="nav-signout-btn" class="button hidden">Déconnexion</button>
      </nav>
      <button type="button" class="button lang-toggle lang-toggle-btn">EN</button>
    </div>
  </header>

  <main>
    <section id="member-flash-card" class="member-flash-section hidden">
      <div class="container">
        <div class="member-flash">
          <div class="member-flash-left">
            <div class="member-flash-meta">
              <span class="member-flash-name" id="flash-name"></span>
              <span class="profile-title-badge hidden" id="flash-title"></span>
            </div>
          </div>
          <div class="member-flash-heroes" id="flash-heroes"></div>
          <a href="members.html" class="button member-flash-link">Mon espace</a>
        </div>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <div class="section-header">
          <span class="eyebrow" data-i18n="tracker.eyebrow">Suivi</span>
          <h1 data-i18n="tracker.title">Classements en direct</h1>
        </div>
        <p data-i18n="tracker.desc">Sélectionnez un événement pour charger les classements. Cliquez sur un joueur pour voir son historique de rondes.</p>

        <div class="tracker-controls">
          <div class="tracker-field">
            <label for="event-select" data-i18n="tracker.event.label">Événement</label>
            <select id="event-select" class="tracker-select">
              <option value="" data-i18n="tracker.event.placeholder">Sélectionner un événement…</option>
            </select>
          </div>
        </div>

        <section id="visitor-player-list" class="visitor-player-list"></section>
        <div id="tracker-status" class="tracker-status hidden"></div>
        <div id="standings-container"></div>
        <div id="stream-embed" class="stream-embed hidden"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">

  <script src="js/i18n.js"></script>
  <script src="js/tournament.js"></script>
  <script src="js/tracker.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/nav-auth.js"></script>
