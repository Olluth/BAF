<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page.title.tournament">Suivi de tournoi | BAF TCG</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="site-layout">

    <aside class="site-sidebar">
      <a href="index.html" class="brand">BAF TCG</a>
      <nav class="site-nav">
        <a href="about.html" data-i18n="nav.about">La BAF</a>
        <a href="events.html" data-i18n="nav.events">Événements</a>
        <a href="news.html" data-i18n="nav.news">Actualités</a>
        <a href="resources.html" data-i18n="nav.resources">Ressources</a>
        <a href="contact.html" data-i18n="nav.contact">Contact</a>
        <a href="tournament.html" class="button" data-i18n="nav.tracker">Suivi de tournoi</a>
      </nav>
      <div class="sidebar-bottom">
        <button type="button" class="button lang-toggle lang-toggle-btn">EN</button>
      </div>
    </aside>

    <div class="site-content">
      <main class="section">
        <div class="container">
          <div class="section-header">
            <span class="eyebrow" data-i18n="tracker.eyebrow">Suivi</span>
            <h2 data-i18n="tracker.title">Classements en direct</h2>
          </div>
          <p data-i18n="tracker.desc">Sélectionnez un événement pour charger les classements en direct. Le round en cours est détecté automatiquement.</p>

          <div class="tracker-controls">
            <div class="tracker-field">
              <label for="event-select" data-i18n="tracker.event.label">Événement</label>
              <select id="event-select" class="tracker-select">
                <option value="" data-i18n="tracker.event.placeholder">Sélectionner un événement…</option>
              </select>
            </div>
            <div class="tracker-round-nav hidden" id="round-nav">
              <button id="round-prev" class="button tracker-round-btn" aria-label="Round précédent">‹</button>
              <span id="round-display" class="tracker-round-display">Round 1</span>
              <button id="round-next" class="button tracker-round-btn" aria-label="Round suivant">›</button>
            </div>
          </div>

          <div id="tracker-status" class="tracker-status"></div>
          <section id="visitor-player-list" class="visitor-player-list"></section>
          <div id="standings-container" class="standings-container"></div>
          <div id="tracked-players" class="tracked-players"></div>
        </div>
      </main>

      <footer class="site-footer">
        <div class="container">
          <p data-i18n="footer.tournament">© 2026 BAF TCG Association. Suivi en direct pour les membres.</p>
        </div>
      </footer>
    </div><!-- /.site-content -->

  </div><!-- /.site-layout -->

  <script src="js/i18n.js"></script>
  <script src="js/tournament.js"></script>
</body>
</html>
